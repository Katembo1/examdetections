<!-- ══════════════ CAMERAS ══════════════ -->
<div id="tab-cameras" class="panel">

  <!-- Add camera form -->
  <div class="card" style="margin-bottom:16px;">
    <div class="card-header"><span class="card-title">Add Camera</span></div>
    <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; padding:4px 0;">
      <div style="flex:1; min-width:140px;">
        <label class="label">Label</label>
        <input id="cameraLabel" class="field" placeholder="e.g. Front Row" />
      </div>
      <div style="flex:2; min-width:180px;">
        <label class="label">Reference &nbsp;<span style="color:var(--muted);font-size:11px;">(0 · 1 · rtsp://… · /dev/video0)</span></label>
        <input id="cameraRef" class="field" placeholder="0  or  rtsp://..." />
      </div>
      <div style="display:flex; gap:6px; padding-bottom:1px;">
        <button id="testCamera" class="btn btn-amber" type="button">Test</button>
        <button id="addCamera"  class="btn btn-green" type="button">Add</button>
      </div>
    </div>
    <div style="margin-top:6px;">
      <span id="addCameraStatus" class="status warn">–</span>
    </div>
  </div>

  <!-- Camera list -->
  <div class="card">
    <div class="card-header" style="display:flex; align-items:center; justify-content:space-between;">
      <span class="card-title">Registered Cameras</span>
      <span id="cameraCountBadge" class="badge badge-amber">0 / 5</span>
    </div>

    <div id="cameraList" style="margin-top:4px;">
      <div class="counts-box">No cameras registered.</div>
    </div>
  </div>

  <!-- Hidden fields still used by JS -->
  <input id="activeCamera" type="hidden" value="{{ camera_ref }}" />
</div>
