<!-- ══════════════ CAMERAS ══════════════ -->
<div id="tab-cameras" class="panel">
  <div class="cols-2" style="gap:20px; align-items:start;">

    <div class="card">
      <div class="card-header"><span class="card-title">Add Camera</span></div>
      <div class="formrow">
        <label class="label">Label</label>
        <input id="cameraLabel" class="field" placeholder="e.g. Front Row" />
      </div>
      <div class="formrow">
        <label class="label">Reference</label>
        <input id="cameraRef" class="field" placeholder="0  or  rtsp://..." />
      </div>
      <div class="cols-2 formrow" style="margin-top:4px;">
        <button id="addCamera"  class="btn btn-green" type="button">Add Camera</button>
        <button id="testCamera" class="btn btn-amber" type="button">Test Stream</button>
      </div>
      <div class="formrow" style="margin-top:8px;">
        <span id="addCameraStatus" class="status warn">–</span>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Registered Cameras</span></div>
      <div class="formrow">
        <label class="label">Model</label>
        <input class="field" value="{{ model_path }}" readonly />
      </div>
      <div class="formrow">
        <label class="label">Active Camera ID</label>
        <input id="activeCamera" class="field" value="{{ camera_ref }}" readonly />
      </div>
      <div id="cameraList" class="counts-box" style="margin-top:8px; min-height:60px;">
        No cameras registered.
      </div>
      <div class="formrow" style="margin-top:8px;">
        <button id="removeCamera" class="btn btn-ghost" type="button">Remove Selected</button>
      </div>
    </div>

  </div>
</div>
