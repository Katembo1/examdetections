<!-- ══════════════ LIVE FEEDS ══════════════ -->
<div id="tab-feeds" class="panel active">

  <div class="inference-bar">
    <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
      <select id="cameraSelect" class="select" style="min-width:180px; width:auto;"></select>
      <span id="cameraCountBadge" class="badge badge-amber">0 / 5</span>
      <button id="startCamera" class="btn btn-green" type="button">Start</button>
      <button id="stopCamera"  class="btn btn-red"   type="button">Stop</button>
      <button id="wsViewBtn"   class="btn btn-amber"  type="button">&#128247; WebSocket View</button>
      <button id="clientCameraBtn" class="btn btn-blue" type="button" style="background:#1f6feb;">&#128250; My Device Camera</button>
      <span id="cameraStatus"       class="status warn" style="margin-left:4px;">–</span>
      <span id="availabilityStatus" class="status warn">–</span>
    </div>
    <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-left:auto;">
      <div class="conf-row">
        <span class="conf-label">Confidence</span>
        <input id="conf" type="range" min="0" max="1" step="0.01" value="{{ confidence }}" />
        <span id="confText" class="conf-value">{{ confidence }}</span>
      </div>
      <button id="inferenceToggle" class="btn btn-green" type="button">Start Inference</button>
    </div>
  </div>

  <div id="feedGrid" class="feed-grid">
    <div class="counts-box" style="grid-column:1/-1">
      No cameras added yet. Go to the <strong>Cameras</strong> tab to register one.
    </div>
  </div>

</div>

<!-- ══════════════ WEBSOCKET VIEWER MODAL ══════════════ -->
<div id="wsModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:var(--surface,#161b22); border:1px solid var(--border,#30363d); border-radius:8px; padding:20px; width:min(92vw,760px); max-height:92vh; overflow:auto;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
      <strong style="font-size:15px;">&#128247; WebSocket Live Feed</strong>
      <button id="wsModalClose" class="btn btn-red" style="padding:2px 10px;">&#x2715;</button>
    </div>

    <div style="display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap;">
      <label style="font-size:13px; color:var(--muted,#8b949e);">Camera:</label>
      <select id="wsCameraSelect" class="select" style="min-width:200px; width:auto;"></select>
      <button id="wsConnectBtn" class="btn btn-green" type="button">Connect</button>
      <button id="wsDisconnectBtn" class="btn btn-red" type="button" disabled>Disconnect</button>
      <span id="wsStatus" class="status warn">Disconnected</span>
    </div>

    <canvas id="wsCanvas" style="width:100%; border-radius:4px; background:#000; display:block;"></canvas>

    <div style="display:flex; gap:20px; margin-top:10px; font-size:12px; color:var(--muted,#8b949e);">
      <span>FPS: <strong id="wsFps">—</strong></span>
      <span>Inference: <strong id="wsInf">—</strong> ms</span>
    </div>
  </div>
</div>

<!-- ══════════════ CLIENT DEVICE CAMERA MODAL ══════════════ -->
<div id="clientCameraModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:var(--surface,#161b22); border:1px solid var(--border,#30363d); border-radius:8px; padding:20px; width:min(92vw,760px); max-height:92vh; overflow:auto;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
      <strong style="font-size:15px;">&#128250; My Device Camera (Live Inference)</strong>
      <button id="clientCameraModalClose" class="btn btn-red" style="padding:2px 10px;">&#x2715;</button>
    </div>

    <div style="display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap;">
      <button id="clientCameraStartBtn" class="btn btn-green" type="button">Start Camera</button>
      <button id="clientCameraStopBtn" class="btn btn-red" type="button" disabled>Stop Camera</button>
      <span id="clientCameraStatus" class="status warn">Not started</span>
    </div>

    <video id="clientCameraVideo" autoplay playsinline muted style="display:none;"></video>
    <canvas id="clientCameraCanvas" style="width:100%; border-radius:4px; background:#000; display:block;"></canvas>

    <div style="display:flex; gap:20px; margin-top:10px; font-size:12px; color:var(--muted,#8b949e); flex-wrap:wrap;">
      <span>FPS: <strong id="clientCameraFps">—</strong></span>
      <span>Inference: <strong id="clientCameraInf">—</strong> ms</span>
      <span>Detections: <strong id="clientCameraDetections">—</strong></span>
    </div>
  </div>
</div>
