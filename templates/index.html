<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONNX Webcam Detection</title>
  <style>
    :root {
      --bg: #04122b;
      --panel: #1e2c45;
      --muted: #334863;
      --accent: #2f6df6;
      --text: #eaf1ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      padding: 16px;
      height: 100vh;
    }
    .left {
      background: var(--panel);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chip {
      background: var(--accent);
      display: inline-block;
      border-radius: 8px;
      padding: 6px 10px;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 18px;
    }
    .label {
      font-weight: 700;
      margin-bottom: 4px;
      color: #b8cdf8;
    }
    .field {
      background: var(--muted);
      border: 1px solid #3f5a7f;
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      width: 100%;
    }
    .counts {
      min-height: 140px;
      white-space: pre-line;
      background: var(--muted);
      border: 1px solid #3f5a7f;
      border-radius: 8px;
      padding: 12px;
    }
    .right {
      background: #0b1934;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .feed {
      width: 100%;
      max-height: calc(100vh - 60px);
      border-radius: 8px;
      border: 1px solid #1f3d6a;
      object-fit: contain;
      background: #000;
    }
    .row { display: grid; gap: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="left">
      <div class="chip">Local ONNX Detection</div>

      <div class="row">
        <div class="label">Model Path</div>
        <input class="field" value="{{ model_path }}" readonly />
      </div>

      <div class="row">
        <div class="label">Camera Reference</div>
        <input class="field" value="{{ camera_ref }}" readonly />
      </div>

      <div class="row">
        <div class="label">Confidence Threshold</div>
        <input id="conf" class="field" type="range" min="0" max="1" step="0.01" value="{{ confidence }}" />
        <input id="confText" class="field" type="text" value="{{ confidence }}" readonly />
      </div>

      <div class="row">
        <div class="label">Detected Object Counts</div>
        <div id="counts" class="counts">No objects detected.</div>
      </div>

      <div class="row">
        <div class="label">Performance</div>
        <div id="perf" class="counts">FPS: 0\nInference: 0 ms</div>
      </div>
    </div>

    <div class="right">
      <img class="feed" src="/video_feed" alt="Live Detection Feed" />
    </div>
  </div>

  <script>
    const conf = document.getElementById('conf');
    const confText = document.getElementById('confText');
    const counts = document.getElementById('counts');
    const perf = document.getElementById('perf');

    async function updateConfig(value) {
      try {
        await fetch('/config', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({confidence: Number(value)})
        });
      } catch (error) {}
    }

    conf.addEventListener('input', (e) => {
      const v = Number(e.target.value).toFixed(2);
      confText.value = v;
    });

    conf.addEventListener('change', (e) => {
      updateConfig(e.target.value);
    });

    async function refreshStats() {
      try {
        const response = await fetch('/stats');
        const data = await response.json();
        counts.textContent = data.counts || 'No objects detected.';
        perf.textContent = `FPS: ${data.fps ?? 0}\nInference: ${data.inference_ms ?? 0} ms`;
      } catch (error) {}
    }

    setInterval(refreshStats, 500);
    refreshStats();
  </script>
</body>
</html>
